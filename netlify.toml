# ─── ADS LAB Ngajigaes.id — Netlify Config ────────────────────────────────────
[build]
  command = "npm install && npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"

[functions."meta-fetch-scheduled"]
  schedule = "0 */4 * * *"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
